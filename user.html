<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User profile — Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<main class="container">
  <div id="publicProfile"></div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const userId = params.get('id');
  const username = params.get('username');
  const root = document.getElementById('publicProfile');

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderBio(text) {
    const emoticonNames = ["computer", "dead", "two"];
    const escaped = escapeHTML(text || "");
    return escaped.replace(/:([a-z0-9_]+):/g, (match, name) => {
      if (!emoticonNames.includes(name)) return match;
      return `<img class="bio-emoticon" src="images/emoticons/${name}.png" alt="${name}">`;
    });
  }

  function renderPublicProfile(user) {
    if (!user) {
      root.innerHTML = `
        <div class="feed-empty" style="padding-top:80px; text-align:center;">
          <div class="error-illustration" style="margin-bottom:28px; max-width:360px; margin-left:auto; margin-right:auto;">
            <img src="images/404page.png" alt="User not found illustration">
          </div>
          <h3>User not found</h3>
          <p><a href="index.html">Back to home</a></p>
        </div>`;
      return;
    }

    root.innerHTML = `
      <div class="settings-avatar-row" style="margin-top:40px;">
        ${user.avatar ? `<img src="${user.avatar}" alt="${user.name}">` : `<div class="initials-lg">${initials(user.name)}</div>`}
        <div>
          <div style="font-family:var(--font-display); font-size:24px; margin-bottom:6px;">${user.name}</div>
          <div style="color:var(--muted); font-size:14px; margin-bottom:12px;">@${user.username}</div>
          <div style="display:flex; gap:18px; color:var(--muted); font-size:14px; margin-bottom:10px;">
            <span>${user.followers.length} followers</span>
            <span>${user.following.length} following</span>
            <span>Joined ${Progress.formatDate(user.joined)}</span>
          </div>
          <div class="bio-text" style="margin-top:12px;">${user.bio ? renderBio(user.bio) : `<span style="color:var(--muted);">No bio yet.</span>`}</div>
        </div>
      </div>
      <div class="settings-section" style="margin-top:24px;">
        <h3>Latest posts</h3>
        <div id="publicPosts"></div>
      </div>
    `;

    fetch(`/api/posts?author=${encodeURIComponent(user.username)}`)
      .then(r => r.json())
      .then(posts => {
        const list = document.getElementById('publicPosts');
        list.innerHTML = posts.length ? posts.map(post => `
          <a class="entry" href="post.html?id=${post.id}">
            <div class="entry-body">
              <span class="entry-date">${Progress.formatDateShort(post.date)}</span>
              <h2 class="entry-title"><span class="underline">${post.title}</span></h2>
              <p class="entry-excerpt">${post.excerpt || ''}</p>
            </div>
          </a>
        `).join('') : '<p style="color:var(--muted);">No posts yet.</p>';
      });
  }

  async function start() {
    await Progress.loadFromApi().catch(() => {});
    initShell();

    let fetchedUser = null;
    try {
      if (userId) {
        const res = await fetch(`/api/users/${userId}`);
        if (res.ok) fetchedUser = await res.json();
      } else if (username) {
        const res = await fetch(`/api/users?username=${encodeURIComponent(username)}`);
        if (res.ok) {
          const users = await res.json();
          fetchedUser = Array.isArray(users) ? users[0] || null : users;
        }
      }
    } catch (e) {
      fetchedUser = null;
    }

    const localUser = Progress.db.users.find(u => u.id === userId) || null;
    const effectiveUser = localUser ? { ...localUser, ...(fetchedUser || {}) } : fetchedUser;
    if (effectiveUser && localUser) {
      effectiveUser.bio = (fetchedUser && fetchedUser.bio !== undefined && fetchedUser.bio !== "") ? fetchedUser.bio : localUser.bio || "";
      effectiveUser.name = fetchedUser?.name || localUser.name;
      effectiveUser.avatar = (fetchedUser && fetchedUser.avatar) ? fetchedUser.avatar : localUser.avatar;
      effectiveUser.followers = fetchedUser?.followers || localUser.followers || [];
      effectiveUser.following = fetchedUser?.following || localUser.following || [];
      effectiveUser.joined = fetchedUser?.joined || localUser.joined;
      effectiveUser.timezone = fetchedUser?.timezone || localUser.timezone;
    }

    renderPublicProfile(effectiveUser);
  }

  start();
</script>
</body>
</html>
