<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User profile — Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<main class="container">
  <div id="publicProfile"></div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const userId = params.get('id');
  const username = params.get('username');
  const root = document.getElementById('publicProfile');

  function renderPublicProfile(user) {
    if (user && user.loading) {
      root.innerHTML = bootingUpHTML({ title: "Waking up the server…", padding: "80px 20px" });
      return;
    }
    if (!user) {
      root.innerHTML = `
        <div class="feed-empty" style="padding-top:80px; text-align:center;">
          <div class="error-illustration" style="margin-bottom:28px; max-width:360px; margin-left:auto; margin-right:auto;">
            <img src="images/404page.png" alt="User not found illustration">
          </div>
          <h3>User not found</h3>
          <p><a href="index.html">Back to home</a></p>
        </div>`;
      return;
    }

    const viewer = Progress.getCurrentUser();
    const isOwnProfile = viewer && viewer.username === user.username;

    root.innerHTML = `
      <div class="settings-avatar-row" style="margin-top:40px;">
        <div class="profile-avatar-wrap">
          ${user.avatar ? `<img class="profile-avatar-img" src="${user.avatar}" alt="${user.name}">` : `<div class="initials-lg">${initials(user.name)}</div>`}
          <span class="profile-online-badge" id="onlineIndicator"></span>
        </div>
        <div>
          <div style="font-family:var(--font-display); font-size:24px; margin-bottom:2px;">
            <span>${user.name}${renderDisplayBadge(user)}</span>
          </div>
          <div style="color:var(--muted); font-size:14px; margin-bottom:4px;">@${user.username}</div>
          <div id="onlineStatusText" style="margin-bottom:10px;"></div>
          <div style="display:flex; gap:18px; color:var(--muted); font-size:14px; margin-bottom:10px;">
            <span id="followerCount">${user.followers.length} followers</span>
            <span>${user.following.length} following</span>
            <span>Joined ${Progress.formatDate(user.joined)}</span>
          </div>
          ${viewer && !isOwnProfile ? `<button type="button" class="upload-btn ${Progress.isFollowing(user.username) ? "following" : ""}" id="followBtn">${Progress.isFollowing(user.username) ? "Following" : "Follow"}</button>` : ""}
          <div class="bio-text" style="margin-top:12px;">${user.bio ? renderEmoticonsText(user.bio, "bio-emoticon") : `<span style="color:var(--muted);">No bio yet.</span>`}</div>
        </div>
      </div>
      <div id="nowPlayingSlot"></div>
${user.spotify ? `
<div class="settings-section" style="margin-top:24px;">
  <h3>Featured Track</h3>
  ${renderSpotifyEmbed(user)}
</div>` : ""}
      <div class="settings-section" style="margin-top:24px;">
        <h3>Latest posts</h3>
        <div id="publicPosts"></div>
      </div>
    `;

    const followBtn = document.getElementById('followBtn');
    if (followBtn) {
      followBtn.addEventListener('click', async () => {
        if (!Progress.getCurrentUser()) { showModal("login"); return; }
        followBtn.disabled = true;
        const result = await Progress.toggleFollow(user.username);
        followBtn.disabled = false;
        if (!result) return;
        const nowFollowing = Progress.isFollowing(user.username);
        followBtn.textContent = nowFollowing ? "Following" : "Follow";
        followBtn.classList.toggle("following", nowFollowing);
        const countEl = document.getElementById('followerCount');
        if (countEl) countEl.textContent = `${result.followers.length} followers`;
        showToast(nowFollowing ? "You are now following this person." : "Unfollowed.");
      });
    }

    const nowPlayingSlot = document.getElementById("nowPlayingSlot");

async function refreshNowPlaying() {
  if (!nowPlayingSlot) return;

  // Don't trust `user.spotifyAccount` here - it can come from a merge with a
  // cached local copy (see the effectiveUser merge in start()) that may
  // predate the account connecting Spotify. Always re-check directly against
  // the server first, so a stale cache can never hide a live "now playing".
  let connected = user.spotifyAccount && user.spotifyAccount.connected;
  if (!connected) {
    try {
      const fresh = await apiFetch(`/api/users/${user.id}`);
      if (fresh && fresh.spotifyAccount && fresh.spotifyAccount.connected) {
        connected = true;
        user.spotifyAccount = fresh.spotifyAccount;
      }
    } catch (e) {
      // leave connected as false; fall through to clearing the slot below
    }
  }

  if (!connected) {
    nowPlayingSlot.innerHTML = "";
    return;
  }

  const data = await fetchSpotifyNowPlaying(user.id);
  nowPlayingSlot.innerHTML = renderNowPlayingWidget(data);
}

refreshNowPlaying();
setInterval(refreshNowPlaying, 30000); // Refresh every 30 seconds

async function refreshOnlineStatus() {
  const el = document.getElementById("onlineIndicator");
  const textEl = document.getElementById("onlineStatusText");
  if (!el && !textEl) return;
  try {
    const result = await apiFetch("/api/online-users");
    const isOnline = !!(result && Array.isArray(result.online) && result.online.includes(user.username));
    if (el) el.classList.toggle("online", isOnline);
    if (textEl) {
      textEl.innerHTML = isOnline
        ? `<span class="online-dot online"></span><span class="online-label online">Online</span>`
        : `<span class="online-dot"></span><span class="online-label">Offline</span>`;
    }
  } catch (e) {
    if (el) el.classList.remove("online");
    if (textEl) textEl.innerHTML = "";
  }
}

refreshOnlineStatus();
setInterval(refreshOnlineStatus, 15000); // Refresh every 15 seconds

    (async () => {
      const result = await apiFetch(`/api/posts?author=${encodeURIComponent(user.username)}`);
      const posts = result || [];
      const list = document.getElementById('publicPosts');
      if (!posts.length) {
        list.innerHTML = '<p style="color:var(--muted);">No posts yet.</p>';
        return;
      }
      list.innerHTML = posts.map(post => `
        <a class="entry" href="post.html?id=${post.id}">
          <div class="entry-body">
            <span class="entry-date">${Progress.formatDateShort(post.date)}</span>
            <h2 class="entry-title"><span class="underline">${renderEmoticonsText(post.title, "inline-emoticon")}</span></h2>
            <p class="entry-excerpt">${renderEmoticonsText(post.excerpt || '', "inline-emoticon")}</p>
          </div>
        </a>
      `).join('');
    })();
  }

  async function start() {
    initShell();
    renderPublicProfile({ loading: true });
    await Progress.loadFromApi().catch(() => {});
    let fetchedUser = null;
    try {
      if (userId) {
        fetchedUser = await apiFetch(`/api/users/${userId}`);
      } else if (username) {
        const users = await apiFetch(`/api/users?username=${encodeURIComponent(username)}`);
        fetchedUser = Array.isArray(users) ? users[0] || null : users;
      }
    } catch (e) {
      fetchedUser = null;
    }

    const localUser = Progress.db.users.find(u => u.id === userId) || null;
    const effectiveUser = localUser ? { ...localUser, ...(fetchedUser || {}) } : fetchedUser;
    if (effectiveUser && localUser) {
      effectiveUser.bio = (fetchedUser && fetchedUser.bio !== undefined && fetchedUser.bio !== "") ? fetchedUser.bio : localUser.bio || "";
      effectiveUser.name = fetchedUser?.name || localUser.name;
      effectiveUser.avatar = (fetchedUser && fetchedUser.avatar) ? fetchedUser.avatar : localUser.avatar;
      effectiveUser.followers = fetchedUser?.followers || localUser.followers || [];
      effectiveUser.following = fetchedUser?.following || localUser.following || [];
      effectiveUser.joined = fetchedUser?.joined || localUser.joined;
      effectiveUser.timezone = fetchedUser?.timezone || localUser.timezone;
      effectiveUser.badges = fetchedUser?.badges || localUser.badges || [];
      effectiveUser.spotifyAccount = fetchedUser?.spotifyAccount || localUser.spotifyAccount;
    }

    renderPublicProfile(effectiveUser);
    attachBadgeTooltip(root);
  }

  start();
</script>
</body>
</html>
