<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>(function(){try{var t=localStorage.getItem("progressTheme");var dark=(t==="dark")||(t!=="light"&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches);if(dark)document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<div id="chatSidebarOverlay" class="chat-sidebar-overlay"></div>

<main class="chat-page-main">
  <div class="chat-wrap" id="chatWrap">
    <!-- filled by JS -->
  </div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const GLOBAL_ROOM = "global";
  const HISTORY_LIMIT = 50;

  let socket = null;
  let reconnectDelay = 1000;
  let reconnectTimer = null;
  let manuallyClosed = false;
  let typingHintTimer = null;
  let lastTypingSent = 0;
  let seenMessageIds = new Set();
  let lastRenderedDateKey = null;

  let currentUser = null;
  let currentRoom = GLOBAL_ROOM;
  let currentPeer = null; // username, or null for the global room

  function dmRoomId(a, b) {
    return "dm:" + [a, b].sort().join(":");
  }

  function wsUrl(room) {
    const httpBase = API_BASE.replace(/\/$/, "");
    const wsBase = httpBase.replace(/^https:/, "wss:").replace(/^http:/, "ws:");
    return `${wsBase}/ws/chat?room=${encodeURIComponent(room)}&token=${encodeURIComponent(getAuthToken())}`;
  }

  function setStatus(text, cls) {
    const el = document.getElementById("chatStatus");
    if (!el) return;
    el.textContent = text;
    el.className = "chat-status" + (cls ? ` ${cls}` : "");
  }

  function scrollToBottom(force) {
    const log = document.getElementById("chatLog");
    if (!log) return;
    const nearBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 120;
    if (force || nearBottom) log.scrollTop = log.scrollHeight;
  }

  function messageRow(msg) {
    const author = Progress.getUser(msg.author);
    const mine = currentUser && msg.author === currentUser.username;
    const imageHTML = msg.image ? `<div class="chat-image"><img src="${msg.image}" alt="Shared image" loading="lazy"></div>` : "";
    const bodyHTML = msg.body ? `<div class="chat-bubble">${renderMentionsInHTML(renderEmoticonsText(msg.body, "inline-emoticon"))}</div>` : "";
    return `
      <div class="chat-msg ${mine ? "mine" : ""}" data-id="${msg.id}">
        ${!mine ? `<a href="user.html?username=${encodeURIComponent(msg.author)}" class="chat-avatar">${avatarHTML(author, 30)}</a>` : ""}
        <div class="chat-bubble-col">
          ${!mine && currentRoom === GLOBAL_ROOM ? `<span class="chat-author">@${escapeHTML(msg.author)}</span>` : ""}
          ${imageHTML}
          ${bodyHTML}
          <span class="chat-time">${Progress.timeAgo(msg.time)}</span>
        </div>
      </div>`;
  }

  function dateSeparatorLabel(isoTime) {
    const msgDate = new Date(isoTime);
    const today = new Date();
    if (msgDate.toDateString() === today.toDateString()) return "Today";
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    if (msgDate.toDateString() === yesterday.toDateString()) return "Yesterday";
    const sameYear = msgDate.getFullYear() === today.getFullYear();
    return msgDate.toLocaleDateString(undefined, sameYear ? { month: "long", day: "numeric" } : { month: "long", day: "numeric", year: "numeric" });
  }

  const linkPreviewCache = new Map();

  function extractFirstUrl(text) {
    const match = (text || "").match(/https?:\/\/[^\s<]+/i);
    return match ? match[0] : null;
  }

  async function attachLinkPreview(msg) {
    const url = extractFirstUrl(msg.body);
    if (!url) return;
    const bubbleCol = document.querySelector(`.chat-msg[data-id="${msg.id}"] .chat-bubble-col`);
    if (!bubbleCol) return;

    let preview;
    if (linkPreviewCache.has(url)) {
      preview = linkPreviewCache.get(url);
    } else {
      const result = await apiFetch(`/api/link-preview?url=${encodeURIComponent(url)}`);
      preview = (result && result.preview) || null;
      linkPreviewCache.set(url, preview);
    }
    if (!preview) return;

    const card = document.createElement("a");
    card.className = "chat-link-preview";
    card.href = preview.url;
    card.target = "_blank";
    card.rel = "noopener noreferrer";
    card.innerHTML = `
      ${preview.image ? `<img src="${preview.image}" alt="">` : ""}
      <div class="chat-link-preview-body">
        ${preview.siteName ? `<div class="chat-link-preview-site">${escapeHTML(preview.siteName)}</div>` : ""}
        ${preview.title ? `<div class="chat-link-preview-title">${escapeHTML(preview.title)}</div>` : ""}
        ${preview.description ? `<div class="chat-link-preview-desc">${escapeHTML(preview.description)}</div>` : ""}
      </div>
    `;
    const timeEl = bubbleCol.querySelector(".chat-time");
    if (timeEl) bubbleCol.insertBefore(card, timeEl);
    else bubbleCol.appendChild(card);
    scrollToBottom();
  }

  function appendMessage(msg) {
    if (seenMessageIds.has(msg.id)) return;
    seenMessageIds.add(msg.id);
    // Silently skip call-signal messages in history.
    if (msg && msg.body && msg.body.startsWith(CALL_SIG)) return;
    const log = document.getElementById("chatLog");
    if (!log) return;
    const empty = log.querySelector(".chat-empty");
    if (empty) empty.remove();
    const dayKey = new Date(msg.time).toDateString();
    if (dayKey !== lastRenderedDateKey) {
      lastRenderedDateKey = dayKey;
      log.insertAdjacentHTML("beforeend", `<div class="chat-date-separator"><span>${dateSeparatorLabel(msg.time)}</span></div>`);
    }
    log.insertAdjacentHTML("beforeend", messageRow(msg));
    scrollToBottom();
    attachLinkPreview(msg);
  }

  function renderPresence(users) {
    const el = document.getElementById("chatPresence");
    if (!el) return;
    if (currentRoom !== GLOBAL_ROOM) { el.textContent = ""; return; }
    const unique = Array.from(new Set(users || []));
    if (!unique.length) { el.textContent = ""; return; }
    el.textContent = unique.length === 1 ? `@${unique[0]} is here` : `${unique.length} people here now`;
  }

  function showTypingHint(username) {
    if (!username || username === currentUser.username) return;
    const el = document.getElementById("chatTyping");
    if (!el) return;
    el.innerHTML = `<span>@${escapeHTML(username)} is typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`;
    clearTimeout(typingHintTimer);
    typingHintTimer = setTimeout(() => { el.innerHTML = ""; }, 2800);
  }

  function closeSocket() {
    manuallyClosed = true;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (socket) { try { socket.close(); } catch (e) {} }
    socket = null;
  }

  function connectSocket() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    manuallyClosed = false;
    setStatus("Connecting…", "connecting");

    let ws;
    try {
      ws = new WebSocket(wsUrl(currentRoom));
    } catch (e) {
      setStatus("Can't connect", "offline");
      scheduleReconnect();
      return;
    }
    socket = ws;

    ws.addEventListener("open", () => {
      if (ws !== socket) return;
      reconnectDelay = 1000;
      setStatus("Live", "online");
    });

    ws.addEventListener("message", (event) => {
      if (ws !== socket) return;
      let data;
      try { data = JSON.parse(event.data); } catch (e) { return; }
      if (data.type === "message") {
        const msg = data.message;
        // Intercept call-signaling messages before appendMessage sees them.
        if (msg && msg.body && msg.body.startsWith(CALL_SIG) && msg.author !== currentUser.username) {
          try { routeCallSignal(JSON.parse(msg.body.slice(CALL_SIG.length))); } catch (e) {}
          seenMessageIds.add(msg.id);
          return;
        }
        appendMessage(msg);
        if (currentRoom.startsWith("dm:")) loadSidebar();
      } else if (data.type === "presence") {
        renderPresence(data.users);
      } else if (data.type === "typing") {
        showTypingHint(data.username);
      } else if (data.type === "dm-notify") {
        // Pushed directly to this connection regardless of which room
        // it's subscribed to - if it's for a different conversation than
        // the one currently open, refresh the sidebar right away so the
        // unread badge appears instantly instead of waiting for the next
        // room switch.
        if (data.room !== currentRoom) loadSidebar();
      } else if (data.type === "notification") {
        // chat.html doesn't open the shared presence socket app.js uses on
        // every other page, so it needs its own handling of this too.
        handleIncomingNotification(data.notification);
      }
      // Call signals arrive as regular "message" packets with a special body prefix.
      // They are intercepted above in the data.type==="message" branch.
    });

    ws.addEventListener("close", () => {
      if (ws !== socket || manuallyClosed) return;
      setStatus("Reconnecting…", "offline");
      scheduleReconnect();
    });

    ws.addEventListener("error", () => { ws.close(); });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connectSocket();
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 15000);
  }

  async function loadHistory() {
    const log = document.getElementById("chatLog");
    log.innerHTML = `<div class="chat-empty">Loading…</div>`;
    seenMessageIds = new Set();
    lastRenderedDateKey = null;
    const url = `/api/chat/messages?room=${encodeURIComponent(currentRoom)}&limit=${HISTORY_LIMIT}`;
    const history = await apiFetch(url);
    if (!history) {
      log.innerHTML = `<div class="chat-empty">Couldn't load history — messages sent from here will still go out live.</div>`;
      return;
    }
    if (!history.length) {
      log.innerHTML = `<div class="chat-empty">No messages yet. Say hello.</div>`;
      return;
    }
    log.innerHTML = "";
    history.forEach(appendMessage);
    scrollToBottom(true);
  }

  function sendMessage(text, imageUrl) {
    const trimmed = (text || "").trim();
    if (!trimmed && !imageUrl) return;
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send(JSON.stringify({ type: "send", body: trimmed, image: imageUrl || null }));
    } else {
      apiFetch("/api/chat/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: currentRoom, author: currentUser.username, body: trimmed, image: imageUrl || null })
      }).then(msg => {
        if (msg) { appendMessage(msg); if (currentRoom.startsWith("dm:")) loadSidebar(); }
      });
    }
  }

  let pendingChatImageUrl = null;

  function clearStagedImage() {
    pendingChatImageUrl = null;
    const staged = document.getElementById("chatImageStaged");
    if (staged) staged.innerHTML = "";
  }

  async function stageChatImage(file) {
    const staged = document.getElementById("chatImageStaged");
    if (!staged) return;
    staged.innerHTML = `<div class="chat-image-staged-loading">Uploading&hellip;</div>`;
    const reader = new FileReader();
    reader.onload = async () => {
      const uploaded = await apiFetch("/api/upload-image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: reader.result })
      });
      if (uploaded && uploaded.url) {
        pendingChatImageUrl = uploaded.url;
        staged.innerHTML = `
          <div class="chat-image-staged-card">
            <img src="${uploaded.url}" alt="">
            <button type="button" class="chat-image-staged-remove" id="chatImageStagedRemove" aria-label="Remove image">&times;</button>
          </div>`;
        const removeBtn = document.getElementById("chatImageStagedRemove");
        if (removeBtn) removeBtn.addEventListener("click", clearStagedImage);
      } else {
        showToast("Could not upload that image. Try again.");
        staged.innerHTML = "";
      }
    };
    reader.readAsDataURL(file);
  }

  function roomListItemHTML(opts) {
    const { room, label, sub, active, avatarUser, unreadCount } = opts;
    return `
      <button type="button" class="chat-room-item ${active ? "active" : ""}" data-room="${escapeHTML(room)}" data-label="${escapeHTML(label)}" data-peer="${escapeHTML(opts.peer || "")}">
        ${avatarUser !== undefined ? `<span class="chat-room-avatar">${avatarHTML(avatarUser, 28)}</span>` : `<span class="chat-room-avatar chat-room-avatar-global">#</span>`}
        <span class="chat-room-text">
          <span class="chat-room-label">${escapeHTML(label)}</span>
          ${sub ? `<span class="chat-room-sub">${sub}</span>` : ""}
        </span>
        ${unreadCount ? `<span class="chat-unread-badge"></span>` : ""}
      </button>`;
  }

  async function loadSidebar() {
    const list = document.getElementById("chatRoomList");
    if (!list) return;
    const conversations = await apiFetch(`/api/chat/conversations`);
    const items = [
      roomListItemHTML({ room: GLOBAL_ROOM, label: "Global", sub: "Everyone", active: currentRoom === GLOBAL_ROOM, avatarUser: undefined })
    ];
    (conversations || []).forEach(conv => {
      const peerUser = Progress.getUser(conv.with);
      const preview = conv.lastMessage ? escapeHTML(conv.lastMessage.body).slice(0, 40) : "";
      items.push(roomListItemHTML({
        room: conv.room,
        label: `@${conv.with}`,
        sub: preview,
        active: currentRoom === conv.room,
        avatarUser: peerUser,
        peer: conv.with,
        unreadCount: currentRoom === conv.room ? 0 : (conv.unreadCount || 0)
      }));
    });
    list.innerHTML = items.join("");
    list.querySelectorAll(".chat-room-item").forEach(btn => {
      btn.addEventListener("click", () => {
        switchRoom(btn.dataset.room, btn.dataset.label, btn.dataset.peer || null);
        closeChatSidebar(); // auto-close on mobile after picking a room
      });
    });
  }

  function switchRoom(room, label, peer) {
    if (room === currentRoom) return;
    currentRoom = room;
    currentPeer = peer || null;
    document.getElementById("chatRoomTitle").textContent = label;
    document.querySelectorAll(".chat-room-item").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.room === room);
    });
    closeSocket();
    loadHistory();
    connectSocket();
    const url = new URL(location.href);
    if (peer) url.searchParams.set("with", peer); else url.searchParams.delete("with");
    history.replaceState(null, "", url);
    if (room.startsWith("dm:")) {
      apiFetch("/api/chat/mark-read", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room })
      }).then(() => loadSidebar());
    }
    updateCallButtonVisibility();
    updateDmListenBanner();
  }

  function startDmFromInput() {
    const input = document.getElementById("newDmInput");
    const username = input.value.trim().replace(/^@/, "");
    if (!username) return;
    if (username.toLowerCase() === currentUser.username.toLowerCase()) {
      showToast("You can't message yourself.");
      return;
    }
    const target = Progress.getUser(username);
    if (!target) {
      showToast("Couldn't find that user.");
      return;
    }
    input.value = "";
    switchRoom(dmRoomId(currentUser.username, target.username), `@${target.username}`, target.username);
    loadSidebar();
  }

  function renderLoggedOut() {
    const wrap = document.getElementById("chatWrap");
    wrap.innerHTML = `
      <div class="feed-empty" style="padding-top:60px;">
        <h3>Log in to join the chat</h3>
        <p>Use the account menu in the top right to log in or create an account.</p>
      </div>`;
  }

  let listenRailTimer = null;

  // Renders the sidebar "Listen Together" rail: any active sessions (so you
  // can join and sync your own Spotify to them), plus a start/end control
  // for the current user's own session. Re-used on a light poll and on the
  // "listen-session-updated" event app.js fires after join/leave/end/sync.
  // Applies fresh session data onto an already-rendered card without tearing
  // down its DOM node, so the progress bar's CSS transition keeps flowing
  // smoothly instead of snapping/glitching back on every ~8s poll.
  function updateListenCardInPlace(cardEl, session) {
    const hasProgress = typeof session.progressMs === "number" && typeof session.durationMs === "number" && session.durationMs > 0;
    cardEl.classList.toggle("is-playing", !!session.isPlaying);
    cardEl.classList.toggle("is-paused", !session.isPlaying);

    // The rail polls every second, but the server only actually refreshes a
    // session's real Spotify position occasionally (on join/sync/detail
    // fetch) - most polls return byte-for-byte the same progress snapshot.
    // Only reset the ticking baseline when something genuinely changed
    // server-side; otherwise leave it alone so the smooth per-second ticker
    // (tickNowPlayingWidgets) keeps advancing the bar uninterrupted instead
    // of being yanked back to the same value every second.
    const serverStamp = String(session.updatedAt || "");
    const changed = cardEl.dataset.serverUpdatedAt !== serverStamp
      || cardEl.dataset.isPlaying !== (session.isPlaying ? "1" : "0");

    if (hasProgress && changed) {
      cardEl.dataset.durationMs = session.durationMs;
      cardEl.dataset.progressMs = session.progressMs;
      cardEl.dataset.fetchedAt = Date.now();
      cardEl.dataset.isPlaying = session.isPlaying ? "1" : "0";
      cardEl.dataset.serverUpdatedAt = serverStamp;
    } else if (!hasProgress) {
      delete cardEl.dataset.durationMs;
      delete cardEl.dataset.progressMs;
      delete cardEl.dataset.fetchedAt;
      delete cardEl.dataset.isPlaying;
      delete cardEl.dataset.serverUpdatedAt;
    }
    const trackEl = cardEl.querySelector(".now-playing-track");
    const artistEl = cardEl.querySelector(".now-playing-artist");
    if (trackEl) trackEl.textContent = session.trackName || "Nothing playing yet";
    if (artistEl) artistEl.textContent = session.artistNames || "";
    const countEl = cardEl.querySelector(".listen-session-count");
    if (countEl) countEl.textContent = `${session.participants.length} listening`;
    const artImg = cardEl.querySelector("img");
    if (artImg && session.albumArt && artImg.src !== session.albumArt) artImg.src = session.albumArt;
  }

  async function loadListenRail() {
    const rail = document.getElementById("chatListenRail");
    if (!rail) return;
    const sessions = await fetchListenSessions();
    const mySession = sessions.find(s => s.hostUsername === currentUser.username);
    const otherSessions = sessions.filter(s => s.hostUsername !== currentUser.username);
    const ordered = [mySession, ...otherSessions].filter(Boolean);

    const hasSpotify = currentUser.spotifyAccount && currentUser.spotifyAccount.connected;
    const startControl = mySession
      ? ""
      : hasSpotify
        ? `<button type="button" class="btn primary" id="startListenBtn" style="width:100%;">Start listening together</button>`
        : `<a href="profile.html?tab=settings" class="field-note" style="display:block;">Connect Spotify to start a listening session</a>`;

    let cardsContainer = rail.querySelector("#chatListenCards");
    const existingIds = cardsContainer
      ? Array.from(cardsContainer.querySelectorAll("[data-session-id]")).map(el => el.dataset.sessionId)
      : [];
    const newIds = ordered.map(s => s.id);
    const sameSet = cardsContainer && existingIds.length === newIds.length && existingIds.every((id, i) => id === newIds[i]);

    if (sameSet) {
      // Nothing structurally changed (same sessions, same order) - update each
      // card's numbers in place instead of rebuilding the DOM.
      ordered.forEach(session => {
        const cardEl = cardsContainer.querySelector(`[data-session-id="${session.id}"]`);
        if (cardEl) updateListenCardInPlace(cardEl, session);
      });
      // The start/end control can still change (e.g. participant count on my
      // own session's button area) - only the title/cards were preserved above.
      let controlSlot = rail.querySelector("#chatListenControl");
      if (controlSlot) controlSlot.innerHTML = startControl;
    } else {
      const cards = ordered.map(s => renderListenSessionCard(s)).join("");
      rail.innerHTML = `
        <div class="chat-listen-rail-title">Listen Together</div>
        <div id="chatListenCards">${cards}</div>
        <div id="chatListenControl">${startControl}</div>
      `;
    }

    const startBtn = document.getElementById("startListenBtn");
    if (startBtn) {
      startBtn.addEventListener("click", async () => {
        startBtn.disabled = true;
        startBtn.textContent = "Starting…";
        const session = await createListenSession();
        if (session) {
          showToast("Listening session started. Friends can join from here.");
          loadListenRail();
        } else {
          showToast("Couldn't start a session. Make sure Spotify is connected and playing.");
          startBtn.disabled = false;
          startBtn.textContent = "Start listening together";
        }
      });
    }
  }

  document.addEventListener("listen-session-updated", () => loadListenRail());

  function openChatSidebar() {
    document.querySelector(".chat-sidebar").classList.add("open");
    document.getElementById("chatSidebarOverlay").classList.add("open");
  }

  function closeChatSidebar() {
    document.querySelector(".chat-sidebar") && document.querySelector(".chat-sidebar").classList.remove("open");
    document.getElementById("chatSidebarOverlay").classList.remove("open");
  }

  function renderChat() {
    const wrap = document.getElementById("chatWrap");
    wrap.innerHTML = `
      <div class="chat-shell">
        <aside class="chat-sidebar">
          <button type="button" class="chat-sidebar-close" id="chatSidebarClose" aria-label="Close sidebar">&times;</button>
          <div class="chat-listen-rail" id="chatListenRail"></div>
          <form class="chat-new-dm" id="newDmForm">
            <input type="text" id="newDmInput" placeholder="Message @username…" autocomplete="off">
          </form>
          <div class="chat-room-list" id="chatRoomList"></div>
        </aside>
        <div class="chat-panel">
          <div class="chat-panel-head">
            <button type="button" class="chat-sidebar-toggle" id="chatSidebarToggle" aria-label="Open rooms">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <span class="chat-room-title" id="chatRoomTitle">Global</span>
            <span class="chat-status" id="chatStatus">Connecting…</span>
            <span class="chat-presence" id="chatPresence"></span>
            <button type="button" class="chat-call-btn" id="chatCallBtn" title="Voice call" style="display:none;">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            </button>
          </div>
          <!-- DM listen-together compact banner — shown when the peer has a listen session -->
          <div class="dm-listen-banner" id="dmListenBanner" style="display:none;"></div>
          <div class="chat-log" id="chatLog">
            <div class="chat-empty">Loading…</div>
          </div>
          <div class="chat-typing" id="chatTyping"></div>
          <div class="chat-image-staged" id="chatImageStaged"></div>
          <form class="chat-input-row" id="chatForm">
            <div class="emoji-picker chat-emoji-picker" id="chatEmojiPicker"></div>
            <button type="button" class="chat-emoji-btn" id="chatEmojiBtn" aria-label="Insert sticker" title="Stickers">🐱</button>
            <button type="button" class="chat-emoji-btn" id="chatImageBtn" aria-label="Attach image" title="Attach image">🖼️</button>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none;">
            <input type="text" id="chatInput" class="chat-input" placeholder="Say something…" maxlength="2000" autocomplete="off">
            <button type="submit" class="chat-send-btn" aria-label="Send">
              <svg class="chat-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <span class="chat-send-label">Send</span>
            </button>
          </form>
        </div>
      </div>
    `;

    document.getElementById("chatForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("chatInput");
      sendMessage(input.value, pendingChatImageUrl);
      input.value = "";
      clearStagedImage();
      closeChatEmojiPicker();
    });

    document.getElementById("chatImageBtn").addEventListener("click", () => {
      document.getElementById("chatImageInput").click();
    });
    document.getElementById("chatImageInput").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) stageChatImage(file);
      e.target.value = "";
    });

    document.getElementById("chatInput").addEventListener("input", () => {
      const now = Date.now();
      if (socket && socket.readyState === WebSocket.OPEN && now - lastTypingSent > 1500) {
        lastTypingSent = now;
        socket.send(JSON.stringify({ type: "typing" }));
      }
    });

    document.getElementById("newDmForm").addEventListener("submit", (e) => {
      e.preventDefault();
      startDmFromInput();
    });

    setupChatEmojiPicker();

    // Mention autocomplete for the chat input
    createMentionAutocomplete(document.getElementById("chatInput"), {
      container: document.getElementById("chatForm")
    });

    // Sidebar toggle (hamburger) — only visible on mobile via CSS
    const sidebarToggle = document.getElementById("chatSidebarToggle");
    if (sidebarToggle) sidebarToggle.addEventListener("click", openChatSidebar);
    const sidebarClose = document.getElementById("chatSidebarClose");
    if (sidebarClose) sidebarClose.addEventListener("click", closeChatSidebar);
    const overlay = document.getElementById("chatSidebarOverlay");
    if (overlay) overlay.addEventListener("click", closeChatSidebar);

    // Swipe right from left edge to open sidebar; swipe left to close
    let touchStartX = 0;
    let touchStartY = 0;
    const shell = wrap.querySelector(".chat-shell");
    if (shell) {
      shell.addEventListener("touchstart", (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      shell.addEventListener("touchend", (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < Math.abs(dy) * 1.5) return; // mostly vertical — ignore
        if (dx > 48 && touchStartX < 40) openChatSidebar(); // swipe right from edge
        if (dx < -48) closeChatSidebar(); // swipe left anywhere
      }, { passive: true });
    }

    loadSidebar();
    loadHistory();
    connectSocket();
    loadListenRail();
    if (listenRailTimer) clearInterval(listenRailTimer);
    listenRailTimer = setInterval(loadListenRail, 1000);

    // Show/hide call button when in a DM
    updateCallButtonVisibility();
  }

  function updateCallButtonVisibility() {
    const callBtn = document.getElementById("chatCallBtn");
    if (!callBtn) return;
    const inDm = currentRoom && currentRoom.startsWith("dm:");
    callBtn.style.display = inDm ? "flex" : "none";
    callBtn.onclick = () => { if (currentPeer) startCall(currentPeer); };
  }

  // ── DM Listen-Together compact banner ───────────────────────────────────
  // When in a DM with someone who has an active listening session, show a
  // compact pill at the top of the chat so you can join without hunting the
  // sidebar.
  async function updateDmListenBanner() {
    const banner = document.getElementById("dmListenBanner");
    if (!banner || !currentPeer) { if (banner) banner.style.display = "none"; return; }
    const sessions = await fetchListenSessions();
    const peerSession = sessions.find(s => s.hostUsername === currentPeer);
    if (!peerSession) { banner.style.display = "none"; return; }
    const viewer = Progress.getCurrentUser();
    const joined = viewer && peerSession.participants.includes(viewer.username);
    banner.style.display = "flex";
    banner.innerHTML = `
      <span class="dm-listen-banner-icon">🎵</span>
      <span class="dm-listen-banner-track">${escapeHTML(peerSession.trackName || "Listening to something")}</span>
      <span class="dm-listen-banner-artist">${escapeHTML(peerSession.artistNames || "")}</span>
      ${joined
        ? `<button type="button" class="dm-listen-action" data-action="sync" data-id="${peerSession.id}">Sync</button>
           <button type="button" class="dm-listen-action dm-listen-leave" data-action="leave" data-id="${peerSession.id}">Leave</button>`
        : `<button type="button" class="dm-listen-action" data-action="join" data-id="${peerSession.id}">Join</button>`}
    `;
    banner.querySelectorAll(".dm-listen-action").forEach(btn => {
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        if (btn.dataset.action === "join") {
          await joinListenSession(btn.dataset.id);
          await syncMeToListenSession(btn.dataset.id);
          showToast("Joined and synced!");
        } else if (btn.dataset.action === "sync") {
          const r = await syncMeToListenSession(btn.dataset.id);
          showToast(r.synced ? "Synced!" : (r.reason || "Couldn't sync."));
        } else if (btn.dataset.action === "leave") {
          await leaveListenSession(btn.dataset.id);
        }
        updateDmListenBanner();
      });
    });
  }

  // Populates the chat emoji popup (reusing the same emoticon set as
  // everywhere else in the app) and wires up: toggling it open/closed,
  // inserting a :name: token at the current cursor position on click, and
  // closing it on an outside click or after sending a message.
  let chatEmojiDocListenerAttached = false;

  // Sets up chat's sticker picker: builds the button grid, wires each one to
  // insert a :name: token at the cursor, and attaches the same hover-preview
  // tooltip used by the reply-form picker on post.html. The document-level
  // outside-click listener is only ever attached once (guarded by the flag
  // above) even though this function itself re-runs on every renderChat(),
  // so re-renders can't stack up duplicate close handlers.
  function setupChatEmojiPicker() {
    const picker = document.getElementById("chatEmojiPicker");
    const toggleBtn = document.getElementById("chatEmojiBtn");
    if (!picker || !toggleBtn) return;

    picker.innerHTML = getEmoticonNames().map(name => `
      <button type="button" class="emoji-btn" data-name="${name}">
        <img src="images/emoticons/${name}.png" alt="${name}">
      </button>
    `).join("");

    let tooltip = document.getElementById("chatEmojiTooltip");
    if (!tooltip) {
      tooltip = document.createElement("div");
      tooltip.id = "chatEmojiTooltip";
      tooltip.className = "emoji-tooltip hidden";
      document.body.appendChild(tooltip);
    }

    picker.querySelectorAll(".emoji-btn").forEach(btn => {
      const name = btn.dataset.name || "";

      btn.addEventListener("mouseenter", () => {
        tooltip.innerHTML = `
          <img src="images/emoticons/${name}.png" alt="${name}">
          <div class="emoji-tooltip-label${name.length > 10 ? " long-name" : ""}">:${name}:</div>
        `;
        tooltip.classList.remove("hidden");
        const rect = btn.getBoundingClientRect();
        const tooltipWidth = 120;
        const gap = 12;
        const left = Math.min(window.innerWidth - tooltipWidth - 12, Math.max(12, rect.left + rect.width / 2 - tooltipWidth / 2));
        const top = rect.top - tooltip.offsetHeight - gap;
        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top < 12 ? rect.bottom + gap : top}px`;
      });
      btn.addEventListener("mouseleave", () => tooltip.classList.add("hidden"));

      btn.addEventListener("click", () => {
        const textarea = document.getElementById("chatInput");
        if (!textarea) return;
        const placeholder = `:${name}:`;
        const start = textarea.selectionStart ?? textarea.value.length;
        const end = textarea.selectionEnd ?? textarea.value.length;
        const value = textarea.value;
        textarea.value = value.slice(0, start) + placeholder + value.slice(end);
        textarea.focus();
        textarea.selectionStart = textarea.selectionEnd = start + placeholder.length;
      });
    });

    toggleBtn.onclick = (e) => {
      e.stopPropagation();
      picker.classList.toggle("open");
    };

    picker.onclick = (e) => e.stopPropagation();

    if (!chatEmojiDocListenerAttached) {
      document.addEventListener("click", closeChatEmojiPicker);
      chatEmojiDocListenerAttached = true;
    }
  }

  function closeChatEmojiPicker() {
    const picker = document.getElementById("chatEmojiPicker");
    if (picker) picker.classList.remove("open");
    const tooltip = document.getElementById("chatEmojiTooltip");
    if (tooltip) tooltip.classList.add("hidden");
  }

  async function start() {
    initShell("chat");

    // Use whatever's already in localStorage — no waiting
    currentUser = Progress.getCurrentUser();

    if (!currentUser) {
        // Not logged in locally either — show logged-out state,
        // then try once more after the API responds
        renderLoggedOut();
        Progress.loadFromApi().then(() => {
            currentUser = Progress.getCurrentUser();
            if (currentUser) start();
        }).catch(() => {});
        return;
    }

    const params = new URLSearchParams(location.search);
    const withUsername = params.get("with");
    if (withUsername && withUsername.toLowerCase() !== currentUser.username.toLowerCase()) {
        currentRoom = dmRoomId(currentUser.username, withUsername);
        currentPeer = withUsername;
    }

    renderChat();
    if (currentPeer) {
        document.getElementById("chatRoomTitle").textContent = `@${currentPeer}`;
    }
    // Refresh in the background — don't block anything on it
    Progress.loadFromApi().catch(() => {});
}

  function closeListenRailPolling() {
    if (listenRailTimer) { clearInterval(listenRailTimer); listenRailTimer = null; }
  }


  /* ============================================================
     WEBRTC VOICE CALL SYSTEM
     ─────────────────────────────────────────────────────────
     SIGNALING APPROACH
     The chat server only relays "send" and "typing" WebSocket
     messages — custom types like "call-offer" are silently
     dropped.  We piggyback on regular DM messages instead:
     each signal body starts with CALL_SIG (📞::), which the
     ws message handler above intercepts before appendMessage
     runs, routes to routeCallSignal(), and marks as seen so
     it never appears in the chat log — not even from history.
     ============================================================ */

  const CALL_SIG = "\u{1F4DE}::"; // 📞:: — unique prefix for call signals

  const ICE_SERVERS = [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "stun:stun2.l.google.com:19302" },
    { urls: "stun:stun.services.mozilla.com" }
  ];

  let _callState    = null;  // null | "calling" | "receiving" | "connected"
  let _peerConn     = null;
  let _localStream  = null;
  let _callPeer     = null;
  let _callTimer    = null;
  let _pendingOffer = null;
  let _muted        = false;

  // Send a signal as a regular DM message with the CALL_SIG prefix
  function sendSignal(type, payload) {
    const body = CALL_SIG + JSON.stringify({ type, from: currentUser.username, ...payload });
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send(JSON.stringify({ type: "send", body }));
    } else {
      apiFetch("/api/chat/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: currentRoom, author: currentUser.username, body })
      });
    }
  }

  // Route an intercepted call signal to the right handler
  function routeCallSignal(sig) {
    switch (sig.type) {
      case "call-offer":  handleCallOffer(sig.from, sig.sdp); break;
      case "call-answer": handleCallAnswer(sig.sdp);          break;
      case "call-ice":    handleCallIce(sig.candidate);       break;
      case "call-reject": showToast("Call declined."); endCall(true); break;
      case "call-end":    if (_callState) endCall(true);      break;
    }
  }

  // Build a peer connection — all handlers set before tracks/offer
  function buildPeerConn() {
    const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    // MUST be set first — candidates can fire as soon as setLocalDescription runs
    pc.onicecandidate = (e) => {
      if (e.candidate) sendSignal("call-ice", { candidate: e.candidate.toJSON() });
    };
    pc.ontrack = (e) => {
      let audio = document.getElementById("callRemoteAudio");
      if (!audio) {
        audio = document.createElement("audio");
        audio.id = "callRemoteAudio";
        audio.autoplay = true;
        document.body.appendChild(audio);
      }
      if (e.streams && e.streams[0]) audio.srcObject = e.streams[0];
    };
    pc.onconnectionstatechange = () => {
      if (["disconnected","failed","closed"].includes(pc.connectionState)) {
        if (_callState === "connected") endCall(true);
      }
    };
    return pc;
  }

  // ── Caller side ───────────────────────────────────────────────────────────
  async function startCall(targetUsername) {
    if (_callState) { showToast("Already in a call."); return; }
    if (!navigator.mediaDevices) { showToast("Voice calls not supported in this browser."); return; }
    try {
      _localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      const m = e.name === "NotAllowedError" ? "Microphone permission denied — allow access and try again."
              : e.name === "NotFoundError"   ? "No microphone found on this device."
              : "Couldn't access your microphone.";
      showToast(m);
      return;
    }
    _callPeer = targetUsername; _callState = "calling"; _muted = false;
    renderCallOverlay("calling");
    _peerConn = buildPeerConn();
    _localStream.getTracks().forEach(t => _peerConn.addTrack(t, _localStream));
    const offer = await _peerConn.createOffer();
    await _peerConn.setLocalDescription(offer);
    sendSignal("call-offer", { sdp: _peerConn.localDescription.toJSON() });
  }

  // ── Callee — incoming ─────────────────────────────────────────────────────
  async function handleCallOffer(from, sdp) {
    if (_callState) { sendSignal("call-reject", {}); return; }
    _callPeer = from; _callState = "receiving"; _pendingOffer = sdp;
    renderCallOverlay("receiving");
    try { new Audio("sounds/notification.mp3").play().catch(() => {}); } catch (e) {}
  }

  async function acceptCall() {
    if (!_pendingOffer) return;
    if (!navigator.mediaDevices) { showToast("Voice calls not supported here."); rejectCall(); return; }
    try {
      _localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) { showToast("Couldn't access your microphone."); rejectCall(); return; }
    _muted = false; _callState = "connected";
    _peerConn = buildPeerConn();
    _localStream.getTracks().forEach(t => _peerConn.addTrack(t, _localStream));
    await _peerConn.setRemoteDescription(new RTCSessionDescription(_pendingOffer));
    const answer = await _peerConn.createAnswer();
    await _peerConn.setLocalDescription(answer);
    sendSignal("call-answer", { sdp: _peerConn.localDescription.toJSON() });
    _pendingOffer = null;
    renderCallOverlay("connected");
    startCallTimer();
  }

  function rejectCall() { sendSignal("call-reject", {}); endCall(true); }

  // ── Caller — receives answer ──────────────────────────────────────────────
  async function handleCallAnswer(sdp) {
    if (!_peerConn) return;
    try {
      await _peerConn.setRemoteDescription(new RTCSessionDescription(sdp));
      _callState = "connected";
      renderCallOverlay("connected");
      startCallTimer();
    } catch (e) { console.error("[Call] setRemoteDescription:", e); showToast("Call failed to connect."); endCall(); }
  }

  async function handleCallIce(candidate) {
    if (!_peerConn || !candidate) return;
    try { await _peerConn.addIceCandidate(new RTCIceCandidate(candidate)); }
    catch (e) { console.warn("[Call] addIceCandidate:", e.message); }
  }

  // ── Hang up ───────────────────────────────────────────────────────────────
  function endCall(silent) {
    if (!silent) sendSignal("call-end", {});
    if (_peerConn)    { _peerConn.close(); _peerConn = null; }
    if (_localStream) { _localStream.getTracks().forEach(t => t.stop()); _localStream = null; }
    clearInterval(_callTimer); _callTimer = null;
    _callState = null; _callPeer = null; _pendingOffer = null; _muted = false;
    const audio = document.getElementById("callRemoteAudio");
    if (audio) { audio.srcObject = null; audio.remove(); }
    const overlay = document.getElementById("callOverlay");
    if (overlay) { overlay.classList.remove("open"); setTimeout(() => overlay.remove(), 300); }
  }

  function startCallTimer() {
    let secs = 0;
    _callTimer = setInterval(() => {
      secs++;
      const m = Math.floor(secs / 60), s = String(secs % 60).padStart(2,"0");
      const el = document.getElementById("callTimerEl");
      if (el) el.textContent = m + ":" + s;
    }, 1000);
  }

  function toggleMute() {
    _muted = !_muted;
    if (_localStream) _localStream.getAudioTracks().forEach(t => t.enabled = !_muted);
    const btn = document.getElementById("callMuteBtn");
    if (btn) { btn.classList.toggle("active", _muted); btn.title = _muted ? "Unmute" : "Mute"; }
  }

  // ── Call overlay UI ───────────────────────────────────────────────────────
  function renderCallOverlay(state) {
    let overlay = document.getElementById("callOverlay");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "callOverlay";
      overlay.className = "call-overlay";
      document.body.appendChild(overlay);
    }
    const user = Progress.getUser(_callPeer);
    const name = escapeHTML((user && user.name) || _callPeer || "Unknown");
    const av   = avatarHTML(user, 72);
    const labels = { calling: "Calling\u2026", receiving: "Incoming call", connected: "Connected" };
    overlay.innerHTML =
      '<div class="call-card">' +
        '<div class="call-avatar-wrap">' + av + '</div>' +
        '<div class="call-name">' + name + '</div>' +
        '<div class="call-state-label">' + (labels[state] || state) +
          (state === "connected" ? ' &middot; <span id="callTimerEl">0:00</span>' : '') +
        '</div>' +
        '<div class="call-controls">' +
          (state === "receiving"
            ? '<button type="button" class="call-ctrl call-ctrl-accept" id="callAcceptBtn" title="Accept">' +
              '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>' +
              '</button>' : "") +
          (state === "connected"
            ? '<button type="button" class="call-ctrl call-ctrl-mute" id="callMuteBtn" title="Mute">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
              '<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>' +
              '<path d="M19 10v2a7 7 0 0 1-14 0v-2"/>' +
              '<line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>' +
              '</svg></button>' : "") +
          '<button type="button" class="call-ctrl call-ctrl-end" id="callEndBtn">' +
          '<svg viewBox="0 0 24 24" fill="currentColor">' +
          '<path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" transform="rotate(135 12 12)"/>' +
          '</svg></button>' +
        '</div>' +
      '</div>';
    overlay.classList.add("open");
    const acceptBtn = document.getElementById("callAcceptBtn");
    const endBtn    = document.getElementById("callEndBtn");
    const muteBtn   = document.getElementById("callMuteBtn");
    if (acceptBtn) acceptBtn.addEventListener("click", acceptCall);
    if (endBtn)    endBtn.addEventListener("click", () => { if (_callState === "receiving") rejectCall(); else endCall(); });
    if (muteBtn)   muteBtn.addEventListener("click", toggleMute);
  }

  window.addEventListener("beforeunload", () => { closeSocket(); closeListenRailPolling(); endCall(true); });

  start();
</script>

</body>
</html>
