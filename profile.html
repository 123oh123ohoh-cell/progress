<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Progress</title>
<meta property="og:site_name" content="Progress">
<meta property="og:type" content="website">
<meta property="og:url" content="https://progressing.online/profile.html">
<meta property="og:title" content="Profile — Progress">
<meta property="og:description" content="Manage your account and writing on Progress.">
<meta property="og:image" content="https://progressing.online/images/nearheader.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Profile — Progress">
<meta name="twitter:description" content="Manage your account and writing on Progress.">
<meta name="twitter:image" content="https://progressing.online/images/nearheader.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>(function(){try{var t=localStorage.getItem("progressTheme");var dark=(t==="dark")||(t!=="light"&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches);if(dark)document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<main class="container">
  <div class="settings-wrap" id="settingsWrap"></div>
</main>

<input type="file" id="avatarInput" accept="image/*" style="display:none;">

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const wrap = document.getElementById("settingsWrap");
  const params = new URLSearchParams(location.search);
  let activeTab = params.get("tab") === "settings" ? "settings" : "profile";
  let user;
  const timezoneOptions = [
    { value: "America/Los_Angeles", label: "Pacific Time - US & Canada" },
    { value: "America/Denver", label: "Mountain Time - US & Canada" },
    { value: "America/Chicago", label: "Central Time - US & Canada" },
    { value: "America/New_York", label: "Eastern Time - US & Canada" },
    { value: "America/Anchorage", label: "Alaska Time - US & Canada" },
    { value: "Pacific/Honolulu", label: "Hawaii Time - US & Canada" },
    { value: "Europe/London", label: "London" },
    { value: "Europe/Berlin", label: "Central Europe" },
    { value: "Asia/Tokyo", label: "Tokyo" },
    { value: "Asia/Seoul", label: "Seoul" },
    { value: "Asia/Kolkata", label: "India" },
    { value: "Australia/Sydney", label: "Sydney" },
    { value: "UTC", label: "UTC" }
  ];

  function formatZonePreview(zone) {
    if (!zone) return "";
    try {
      return new Intl.DateTimeFormat(undefined, {
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZone: zone,
        timeZoneName: "short"
      }).format(new Date());
    } catch (e) {
      return zone;
    }
  }

  async function refreshNowPlaying() {
    const slot = document.getElementById("nowPlayingSlot");
    if (!slot || !user) return;
    if (!user.spotifyAccount || !user.spotifyAccount.connected) { slot.innerHTML = ""; return; }
    const data = await fetchSpotifyNowPlaying(user.id);
    slot.innerHTML = renderNowPlayingWidget(data);
  }

  async function start() {
    initShell("profile");
    user = Progress.getCurrentUser();
    if (!user) {
      wrap.innerHTML = `
        <div class="feed-empty" style="padding-top:60px;">
          <h3>Log in to view your profile</h3>
          <p>Use the account menu in the top right to log in or create an account.</p>
        </div>`;
      return;
    }
    const spotifyStatus = params.get("spotify");
    if (spotifyStatus === "connected") {
      showToast("Spotify connected!");
      history.replaceState(null, "", "profile.html?tab=settings");
    } else if (spotifyStatus === "error") {
      showToast("Couldn't connect Spotify. Please try again.");
      history.replaceState(null, "", "profile.html?tab=settings");
    }
    render();
    Progress.loadFromApi().then(() => {
      user = Progress.getCurrentUser();
      render();
    }).catch(() => {});
    setInterval(refreshNowPlaying, 10000); // Refresh every 10 seconds
  }

  start();

  function render() {
    const myPosts = Progress.getPosts().filter(p => p.author === user.username);

    wrap.innerHTML = `
      <h1>Your account</h1>
      <div class="settings-avatar-row">
        ${user.avatar ? `<img src="${user.avatar}" alt="">` : `<div class="initials-lg">${initials(user.name)}</div>`}
        <div>
          <div style="font-family:var(--font-display); font-size:19px; margin-bottom:4px;">${user.name}${renderDisplayBadge(user)}</div>
          <div style="color:var(--muted); font-size:13.5px; margin-bottom:8px;">@${user.username}</div>
          <div style="display:flex; gap:16px; font-size:13px; color:var(--muted); margin-bottom:10px;">
            <span>${user.followers?.length || 0} followers</span>
            <span>${user.following?.length || 0} following</span>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="upload-btn" id="changeAvatarBtn">Change photo</button>
            <a class="upload-btn" href="user.html?id=${user.id}" style="text-decoration:none;">View profile</a>
          </div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn ${activeTab === "profile" ? "active" : ""}" data-tab="profile">Profile</button>
        <button class="tab-btn ${activeTab === "settings" ? "active" : ""}" data-tab="settings">Settings</button>
      </div>

      <div id="tabContent"></div>
    `;

    document.getElementById("changeAvatarBtn").addEventListener("click", () => document.getElementById("avatarInput").click());

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        history.replaceState(null, "", "profile.html?tab=" + activeTab);
        render();
      });
    });

    const content = document.getElementById("tabContent");
    if (activeTab === "profile") {
      content.innerHTML = `
        <div id="nowPlayingSlot"></div>
        <div class="settings-section">
          <h3>Joined</h3>
          <p style="margin:0;">${Progress.formatDate(user.joined || "Unknown")}</p>
        </div>
        <div class="settings-section">
          <h3>Bio</h3>
          <div class="bio-text">${user.bio ? renderEmoticonsText(user.bio, "bio-emoticon") : `<span style="color:var(--muted);">No bio yet.</span>`}</div>
        </div>
        ${user.spotify ? `
        <div class="settings-section">
          <h3>Featured track</h3>
          ${renderSpotifyEmbed(user)}
        </div>` : ""}
        <div class="settings-section">
          <h3>Timezone</h3>
          <p style="margin:0;">${user.timezone || Progress.getTimeZone()}</p>
        </div>
        <div class="settings-section">
          <h3>Badges</h3>
          ${user.badges && user.badges.length ? renderBadgeDetails(user) : `<p style="color:var(--muted); font-size:14px;">No badges earned yet.</p>`}
        </div>
        <div class="settings-section">
          <h3>Entries (${myPosts.length})</h3>
          ${myPosts.length ? myPosts.map(p => `
            <a href="post.html?id=${p.id}" style="display:block; padding:12px 0; border-bottom:1px solid var(--mocha-wash); font-size:14.5px;">
              <span style="font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; margin-right:10px;">${Progress.formatDateShort(p.date)}</span>
              ${p.title}
            </a>`).join("") : `<p style="color:var(--muted); font-size:14px;">No entries published yet.</p>`}
        </div>
      `;
refreshNowPlaying();
    } else {
      content.innerHTML = `
        <div class="settings-section">
          <h3>Display name</h3>
          <div class="field"><input id="nameField" value="${user.name}"></div>
        </div>
        <div class="settings-section">
          <h3>Username</h3>
          <div class="field"><input id="usernameField" value="${user.username}" disabled style="opacity:.6;"></div>
        </div>
        <div class="settings-section">
          <h3>Bio</h3>
          <div class="field bio-field">
            <textarea id="bioField" rows="5" placeholder="Tell people about yourself... (bios are work in progress!! they might not work.)">${escapeHTML(user.bio || "")}</textarea>
          </div>
          <div class="emoji-picker" id="profileEmojiPicker"></div>
          <div class="field-note">Use <code>:computer:</code>, <code>:dead:</code>, <code>:two:</code> for custom emoticons.</div>
        </div>
        <div class="settings-section">
          <h3>Spotify account</h3>
          <div id="spotifyAccountBox">
            ${user.spotifyAccount && user.spotifyAccount.connected ? `
              <div class="spotify-connect-row">
                <span class="spotify-connect-status">✓ Connected${user.spotifyAccount.displayName ? ` as <a href="${user.spotifyAccount.profileUrl || "#"}" target="_blank" rel="noopener noreferrer">${escapeHTML(user.spotifyAccount.displayName)}</a>` : ""}</span>
                <button class="btn danger" id="disconnectSpotifyBtn">Disconnect</button>
              </div>
            ` : `
              <div class="spotify-connect-row">
                <button class="btn" id="connectSpotifyBtn">Connect Spotify</button>
              </div>
            `}
          </div>
          <p class="field-note">Connect your real Spotify account to show what you're currently listening to on your profile. Anyone who visits your profile can see it.</p>
        </div>
        <div class="settings-section">
          <h3>Featured Spotify link</h3>
          <div class="field"><input id="spotifyField" placeholder="Paste a Spotify track, album, playlist, or artist link" value="${escapeHTML(user.spotify || "")}"></div>
          <p class="field-note">Right-click a song, album, playlist, or artist in Spotify → Share → Copy Link, then paste it here. It'll show up as a mini player on your profile.</p>
          <div id="spotifyPreview">${renderSpotifyEmbed(user)}</div>
        </div>
        <div class="settings-section">
          <h3>Timezone</h3>
          <div class="field">
            <select id="timezoneField">
              ${timezoneOptions.map(option => `
                <option value="${option.value}" ${user.timezone === option.value ? "selected" : ""}>${option.label}</option>
              `).join("")}
            </select>
          </div>
          <p class="field-note">Sample time in this zone: <span id="timezonePreview">${formatZonePreview(user.timezone)}</span></p>
          <p class="field-note">Your timestamps will now display in the selected timezone.</p>
        </div>
        <div class="settings-section">
          <h3>Appearance</h3>
          <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <svg class="theme-flank-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>
            <span class="theme-toggle-switch" id="themeToggleSwitch" data-on="${getStoredTheme() === "dark" ? "1" : "0"}">
              <span class="theme-toggle-knob"></span>
            </span>
            <svg class="theme-flank-icon moon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.5 14.5A8.5 8.5 0 019.5 3.5 8.5 8.5 0 1020.5 14.5z"/></svg>
            <span style="font-size:14px; margin-left:4px;">Dark mode</span>
          </label>
          <p class="field-note">Saved to this browser - it'll stay set here even if you log in on another device.</p>
        </div>
        <button class="btn primary" id="saveSettingsBtn">Save changes</button>
        <div class="settings-section" style="margin-top:40px; padding-top:40px; border-top:1px solid var(--border-color);">
          <h3 style="color:var(--error);">Danger Zone</h3>
          <p style="color:var(--muted); font-size:14px; margin-bottom:12px;">Delete your account and all associated data permanently. This action cannot be undone.</p>
          <button class="btn danger" id="deleteAccountBtn">Delete account</button>
        </div>
      `;
      document.getElementById("themeToggleSwitch").addEventListener("click", (e) => {
        const el = e.currentTarget;
        const nowOn = el.dataset.on !== "1";
        el.dataset.on = nowOn ? "1" : "0";
        setTheme(nowOn ? "dark" : "light");
      });

      document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const name = document.getElementById("nameField").value.trim();
        const bio = document.getElementById("bioField").value.trim();
        const timezone = document.getElementById("timezoneField").value;
        const spotify = document.getElementById("spotifyField").value.trim();
        if (!name) { showToast("Display name can't be empty."); return; }
        if (spotify && !spotifyEmbedUrl(spotify)) { showToast("That doesn't look like a valid Spotify link."); return; }
        const updated = await Progress.updateProfile({ name, bio, timezone, spotify });
        if (!updated) {
          showToast("Could not save settings.");
          return;
        }
        user = updated || Progress.getCurrentUser() || user;
        user.name = name;
        user.bio = bio;
        user.timezone = timezone;
        user.spotify = spotify;
        render();
        showToast("Settings saved.");
      });

      document.getElementById("deleteAccountBtn").addEventListener("click", async () => {
        if (!confirm("Are you sure? This will delete your account and all your posts. This cannot be undone.")) return;
        if (!confirm("Really? Type 'delete' to confirm...")) {
          const confirmText = prompt("Type 'delete' to permanently delete your account:");
          if (confirmText !== "delete") {
            showToast("Account deletion cancelled.");
            return;
          }
        }
        showToast("Deleting account...");
        const deleted = await Progress.deleteAccount();
        if (deleted) {
          showToast("Account deleted.");
          setTimeout(() => location.href = "index.html", 500);
        } else {
          showToast("Could not delete account.");
        }
      });

      const profileEmojiPicker = document.getElementById("profileEmojiPicker");
      if (profileEmojiPicker) {
        profileEmojiPicker.innerHTML = getEmoticonNames().map(name => `
          <button type="button" class="emoji-btn" data-name="${name}">
            <img src="images/emoticons/${name}.png" alt="${name}">
          </button>
        `).join("");
        profileEmojiPicker.querySelectorAll(".emoji-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const textarea = document.getElementById("bioField");
            if (!textarea) return;
            const name = btn.dataset.name || "";
            const placeholder = `:${name}:`;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const value = textarea.value;
            textarea.value = value.slice(0, start) + placeholder + value.slice(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + placeholder.length;
          });
        });
      }

      const timezoneField = document.getElementById("timezoneField");
      const timezonePreview = document.getElementById("timezonePreview");
      timezoneField.addEventListener("change", () => {
        timezonePreview.textContent = formatZonePreview(timezoneField.value);
      });

      const spotifyField = document.getElementById("spotifyField");
      const spotifyPreview = document.getElementById("spotifyPreview");
      let spotifyPreviewTimer;
      spotifyField.addEventListener("input", () => {
        clearTimeout(spotifyPreviewTimer);
        spotifyPreviewTimer = setTimeout(() => {
          const val = spotifyField.value.trim();
          if (!val) { spotifyPreview.innerHTML = ""; return; }
          const embed = renderSpotifyEmbed({ spotify: val });
          spotifyPreview.innerHTML = embed || `<p class="field-note" style="color:var(--danger);">That doesn't look like a Spotify link yet.</p>`;
        }, 400);
      });

      const connectSpotifyBtn = document.getElementById("connectSpotifyBtn");
      if (connectSpotifyBtn) {
        apiFetch("/api/spotify/status").then(status => {
          if (status && status.configured === false) {
            connectSpotifyBtn.disabled = true;
            connectSpotifyBtn.textContent = "Not configured yet";
            connectSpotifyBtn.title = "Spotify integration isn't set up on this server yet.";
          }
        });
        connectSpotifyBtn.addEventListener("click", () => {
          window.location.href = `${API_BASE}/api/spotify/login?userId=${encodeURIComponent(user.id)}`;
        });
      }

      const disconnectSpotifyBtn = document.getElementById("disconnectSpotifyBtn");
      if (disconnectSpotifyBtn) {
        disconnectSpotifyBtn.addEventListener("click", async () => {
          disconnectSpotifyBtn.disabled = true;
          const result = await apiFetch(`/api/users/${user.id}/spotify/disconnect`, { method: "POST" });
          if (result) {
            user = result;
            render();
            showToast("Disconnected Spotify.");
          } else {
            disconnectSpotifyBtn.disabled = false;
            showToast("Could not disconnect. Try again.");
          }
        });
      }
    }

    attachBadgeTooltip(wrap);
    attachBadgeClick(wrap);
  }

  function attachBadgeClick(root) {
    if (!root) return;
    root.querySelectorAll(".profile-badge").forEach(el => {
      el.addEventListener("click", async () => {
        const badgeId = el.dataset.badgeId;
        if (!badgeId) return;
        if (badgeId === "dexterity") {
          showToast("This badge can't be displayed on display name.");
          return;
        }
        const isActive = user.displayBadge === badgeId;
        const nextBadge = isActive ? null : badgeId;
        const updated = await Progress.updateProfile({ displayBadge: nextBadge });
        if (updated) {
          user = updated;
          render();
          showToast(isActive
            ? `Removed ${BADGES[badgeId].label} from your name.`
            : `Displayed ${BADGES[badgeId].label} on your name.`);
        } else {
          showToast("Could not update your badge. Please try again.");
        }
      });
    });
  }

  document.getElementById("avatarInput").addEventListener("change", () => {
    const file = document.getElementById("avatarInput").files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      await Progress.updateProfile({ avatar: reader.result });
      showToast("Photo updated.");
      setTimeout(() => location.reload(), 400);
    };
    reader.readAsDataURL(file);
  });
</script>

</body>
</html>
