<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<main class="container">
  <div class="settings-wrap" id="settingsWrap"></div>
</main>

<input type="file" id="avatarInput" accept="image/*" style="display:none;">

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const wrap = document.getElementById("settingsWrap");
  const params = new URLSearchParams(location.search);
  let activeTab = params.get("tab") === "settings" ? "settings" : "profile";
  let user;
  const timezoneOptions = [
    { value: "America/Los_Angeles", label: "Pacific Time - US & Canada" },
    { value: "America/Denver", label: "Mountain Time - US & Canada" },
    { value: "America/Chicago", label: "Central Time - US & Canada" },
    { value: "America/New_York", label: "Eastern Time - US & Canada" },
    { value: "America/Anchorage", label: "Alaska Time - US & Canada" },
    { value: "Pacific/Honolulu", label: "Hawaii Time - US & Canada" },
    { value: "Europe/London", label: "London" },
    { value: "Europe/Berlin", label: "Central Europe" },
    { value: "Asia/Tokyo", label: "Tokyo" },
    { value: "Asia/Seoul", label: "Seoul" },
    { value: "Asia/Kolkata", label: "India" },
    { value: "Australia/Sydney", label: "Sydney" },
    { value: "UTC", label: "UTC" }
  ];

  function formatZonePreview(zone) {
    if (!zone) return "";
    try {
      return new Intl.DateTimeFormat(undefined, {
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZone: zone,
        timeZoneName: "short"
      }).format(new Date());
    } catch (e) {
      return zone;
    }
  }

  async function start() {
    initShell("profile");
    user = Progress.getCurrentUser();
    if (!user) {
      wrap.innerHTML = `
        <div class="feed-empty" style="padding-top:60px;">
          <h3>Log in to view your profile</h3>
          <p>Use the account menu in the top right to log in or create an account.</p>
        </div>`;
      return;
    }
    render();
    Progress.loadFromApi().then(() => {
      user = Progress.getCurrentUser();
      render();
    }).catch(() => {});
  }

  start();

  function render() {
    const myPosts = Progress.getPosts().filter(p => p.author === user.username);

    wrap.innerHTML = `
      <h1>Your account</h1>
      <div class="settings-avatar-row">
        ${user.avatar ? `<img src="${user.avatar}" alt="">` : `<div class="initials-lg">${initials(user.name)}</div>`}
        <div>
          <div style="font-family:var(--font-display); font-size:19px; margin-bottom:4px;">${user.name}${renderDisplayBadge(user)}</div>
          <div style="color:var(--muted); font-size:13.5px; margin-bottom:8px;">@${user.username}</div>
          <div style="display:flex; gap:16px; font-size:13px; color:var(--muted); margin-bottom:10px;">
            <span>${user.followers?.length || 0} followers</span>
            <span>${user.following?.length || 0} following</span>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="upload-btn" id="changeAvatarBtn">Change photo</button>
            <a class="upload-btn" href="user.html?id=${user.id}" style="text-decoration:none;">View profile</a>
          </div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn ${activeTab === "profile" ? "active" : ""}" data-tab="profile">Profile</button>
        <button class="tab-btn ${activeTab === "settings" ? "active" : ""}" data-tab="settings">Settings</button>
      </div>

      <div id="tabContent"></div>
    `;

    document.getElementById("changeAvatarBtn").addEventListener("click", () => document.getElementById("avatarInput").click());

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        history.replaceState(null, "", "profile.html?tab=" + activeTab);
        render();
      });
    });

    const content = document.getElementById("tabContent");
    if (activeTab === "profile") {
      content.innerHTML = `
        <div class="settings-section">
          <h3>Joined</h3>
          <p style="margin:0;">${Progress.formatDate(user.joined || "Unknown")}</p>
        </div>
        <div class="settings-section">
          <h3>Bio</h3>
          <div class="bio-text">${user.bio ? renderEmoticonsText(user.bio, "bio-emoticon") : `<span style="color:var(--muted);">No bio yet.</span>`}</div>
        </div>
        <div class="settings-section">
          <h3>Timezone</h3>
          <p style="margin:0;">${user.timezone || Progress.getTimeZone()}</p>
        </div>
        <div class="settings-section">
          <h3>Badges</h3>
          ${user.badges && user.badges.length ? renderBadgeDetails(user) : `<p style="color:var(--muted); font-size:14px;">No badges earned yet.</p>`}
        </div>
        <div class="settings-section">
          <h3>Entries (${myPosts.length})</h3>
          ${myPosts.length ? myPosts.map(p => `
            <a href="post.html?id=${p.id}" style="display:block; padding:12px 0; border-bottom:1px solid var(--mocha-wash); font-size:14.5px;">
              <span style="font-family:var(--font-mono); font-size:11px; color:var(--muted); text-transform:uppercase; margin-right:10px;">${Progress.formatDateShort(p.date)}</span>
              ${p.title}
            </a>`).join("") : `<p style="color:var(--muted); font-size:14px;">No entries published yet.</p>`}
        </div>
      `;
    } else {
      content.innerHTML = `
        <div class="settings-section">
          <h3>Display name</h3>
          <div class="field"><input id="nameField" value="${user.name}"></div>
        </div>
        <div class="settings-section">
          <h3>Username</h3>
          <div class="field"><input id="usernameField" value="${user.username}" disabled style="opacity:.6;"></div>
        </div>
        <div class="settings-section">
          <h3>Bio</h3>
          <div class="field bio-field">
            <textarea id="bioField" rows="5" placeholder="Tell people about yourself... (bios are work in progress!! they might not work.)">${escapeHTML(user.bio || "")}</textarea>
          </div>
          <div class="emoji-picker" id="profileEmojiPicker"></div>
          <div class="field-note">Use <code>:computer:</code>, <code>:dead:</code>, <code>:two:</code> for custom emoticons.</div>
        </div>
        <div class="settings-section">
          <h3>Timezone</h3>
          <div class="field">
            <select id="timezoneField">
              ${timezoneOptions.map(option => `
                <option value="${option.value}" ${user.timezone === option.value ? "selected" : ""}>${option.label}</option>
              `).join("")}
            </select>
          </div>
          <p class="field-note">Sample time in this zone: <span id="timezonePreview">${formatZonePreview(user.timezone)}</span></p>
          <p class="field-note">Your timestamps will now display in the selected timezone.</p>
        </div>
        <button class="btn primary" id="saveSettingsBtn">Save changes</button>
      `;
      document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
        const name = document.getElementById("nameField").value.trim();
        const bio = document.getElementById("bioField").value.trim();
        const timezone = document.getElementById("timezoneField").value;
        if (!name) { showToast("Display name can't be empty."); return; }
        const updated = await Progress.updateProfile({ name, bio, timezone });
        if (!updated) {
          showToast("Could not save settings.");
          return;
        }
        user = updated || Progress.getCurrentUser() || user;
        user.name = name;
        user.bio = bio;
        user.timezone = timezone;
        render();
        showToast("Settings saved.");
      });

      const profileEmojiPicker = document.getElementById("profileEmojiPicker");
      if (profileEmojiPicker) {
        profileEmojiPicker.innerHTML = getEmoticonNames().map(name => `
          <button type="button" class="emoji-btn" data-name="${name}">
            <img src="images/emoticons/${name}.png" alt="${name}">
          </button>
        `).join("");
        profileEmojiPicker.querySelectorAll(".emoji-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const textarea = document.getElementById("bioField");
            if (!textarea) return;
            const name = btn.dataset.name || "";
            const placeholder = `:${name}:`;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const value = textarea.value;
            textarea.value = value.slice(0, start) + placeholder + value.slice(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + placeholder.length;
          });
        });
      }

      const timezoneField = document.getElementById("timezoneField");
      const timezonePreview = document.getElementById("timezonePreview");
      timezoneField.addEventListener("change", () => {
        timezonePreview.textContent = formatZonePreview(timezoneField.value);
      });
    }

    attachBadgeTooltip(wrap);
    attachBadgeClick(wrap);
  }

  function attachBadgeClick(root) {
    if (!root) return;
    root.querySelectorAll(".profile-badge").forEach(el => {
      el.addEventListener("click", async () => {
        const badgeId = el.dataset.badgeId;
        if (!badgeId) return;
        if (badgeId === "dexterity") {
          showToast("This badge can't be displayed on display name.");
          return;
        }
        const updated = await Progress.updateProfile({ displayBadge: badgeId });
        if (updated) {
          user = updated;
          render();
          showToast(`Displayed ${BADGES[badgeId].label} on your name.`);
        }
      });
    });
  }

  document.getElementById("avatarInput").addEventListener("change", () => {
    const file = document.getElementById("avatarInput").files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      await Progress.updateProfile({ avatar: reader.result });
      showToast("Photo updated.");
      setTimeout(() => location.reload(), 400);
    };
    reader.readAsDataURL(file);
  });


  initShell("profile");
</script>

</body>
</html>
