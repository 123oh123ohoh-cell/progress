<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Users — Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-root"></div>
<div id="modal-root"></div>

<main class="container">
  <div style="margin-top:40px; margin-bottom:40px;">
    <h1 style="font-family:var(--font-display); font-size:32px; margin-bottom:12px;">Community</h1>
    <p style="color:var(--muted); font-size:16px;">Browse writers and follow their journeys</p>
  </div>

  <div id="usersDirectory" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px;"></div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const root = document.getElementById("usersDirectory");

  async function renderUsers() {
    root.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--muted);">Loading users...</div>`;
    
    try {
      await Progress.loadFromApi().catch(() => {});
      const allUsers = Progress.db.users || [];
      
      if (!allUsers.length) {
        root.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--muted);">No users yet.</div>`;
        return;
      }

      root.innerHTML = allUsers
        .filter(u => u.username) // Filter out invalid users
        .map(user => {
          const followerCount = user.followers ? user.followers.length : 0;
          const postCount = (Progress.db.posts || []).filter(p => p.author === user.username).length;
          const isCurrentUser = Progress.getCurrentUser() && Progress.getCurrentUser().username === user.username;
          
          return `
            <a href="user.html?id=${user.id}" style="text-decoration:none;">
              <div style="
                background:var(--bg-card);
                border-radius:8px;
                padding:20px;
                cursor:pointer;
                transition:all 0.2s;
                border:1px solid var(--border-color);
              " onmouseover="this.style.borderColor='var(--accent)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.borderColor='var(--border-color)'; this.style.transform='translateY(0)';">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                  ${user.avatar 
                    ? `<img src="${user.avatar}" alt="${user.name}" style="width:48px; height:48px; border-radius:50%; object-fit:cover; flex-shrink:0;">` 
                    : `<div class="initials-lg" style="width:48px; height:48px; font-size:18px; flex-shrink:0;">${initials(user.name)}</div>`}
                  <div style="flex:1; min-width:0;">
                    <div style="font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                      ${user.name}${renderDisplayBadge(user)}
                    </div>
                    <div style="color:var(--muted); font-size:13px;">@${user.username}</div>
                  </div>
                </div>
                
                ${user.bio ? `<p style="font-size:13px; margin:8px 0; color:var(--text); line-height:1.4; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${user.bio}</p>` : ''}
                
                <div style="display:flex; gap:12px; font-size:12px; color:var(--muted); margin-top:12px; padding-top:12px; border-top:1px solid var(--border-color);">
                  <span>${postCount} ${postCount === 1 ? 'post' : 'posts'}</span>
                  <span>${followerCount} ${followerCount === 1 ? 'follower' : 'followers'}</span>
                </div>

                ${renderBadges(user) ? `<div style="margin-top:12px; display:flex; gap:6px; flex-wrap:wrap;">
                  ${renderBadges(user)}
                </div>` : ''}
              </div>
            </a>
          `;
        })
        .join("");
    } catch (e) {
      root.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--error);">Error loading users</div>`;
    }
  }

  initShell("users");
  renderUsers();
</script>

</body>
</html>
